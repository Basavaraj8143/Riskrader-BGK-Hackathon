<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RiskRadar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 280px;
      background: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
    }

    .header {
      padding: 16px 18px 14px;
      border-bottom: 1px solid #1e293b;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #ef4444, #f97316);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    .brand-name { font-size: 15px; font-weight: 700; color: #f1f5f9; }
    .brand-sub  { font-size: 10px; color: #475569; letter-spacing: 0.05em; }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid #1e293b;
    }

    .toggle-label { color: #94a3b8; font-size: 12px; }

    .toggle {
      position: relative;
      width: 36px; height: 20px;
    }

    .toggle input { display: none; }

    .toggle-track {
      position: absolute; inset: 0;
      background: #1e293b;
      border-radius: 99px;
      cursor: pointer;
      transition: background 0.2s;
      border: 1px solid #334155;
    }

    .toggle input:checked + .toggle-track { background: #ef4444; border-color: #ef4444; }

    .toggle-thumb {
      position: absolute;
      top: 3px; left: 3px;
      width: 12px; height: 12px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle input:checked ~ .toggle-thumb { transform: translateX(16px); }

    .last-scan {
      padding: 14px 18px;
      border-bottom: 1px solid #1e293b;
    }

    .section-label {
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #475569;
      margin-bottom: 10px;
    }

    .scan-empty {
      color: #334155;
      font-size: 12px;
      text-align: center;
      padding: 10px 0;
    }

    .scan-card {
      background: #1e293b;
      border-radius: 10px;
      padding: 10px 12px;
      border: 1px solid #334155;
    }

    .scan-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 2px 9px;
      border-radius: 99px;
      font-size: 10px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .scan-badge.HIGH   { background: rgba(239,68,68,0.15);  color: #f87171; }
    .scan-badge.MEDIUM { background: rgba(234,179,8,0.15);  color: #facc15; }
    .scan-badge.LOW    { background: rgba(34,197,94,0.15);  color: #4ade80; }

    .scan-url {
      font-size: 10.5px;
      color: #64748b;
      word-break: break-all;
      margin-bottom: 4px;
    }

    .scan-cat {
      font-size: 11px;
      color: #94a3b8;
    }

    .footer {
      padding: 12px 18px;
      display: flex;
      gap: 8px;
    }

    .btn {
      flex: 1;
      padding: 8px 0;
      border-radius: 8px;
      font-size: 11.5px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      text-align: center;
      text-decoration: none;
      display: inline-block;
      transition: opacity 0.15s;
    }

    .btn:hover { opacity: 0.8; }
    .btn-primary { background: #ef4444; color: #fff; }
    .btn-secondary { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
  </style>
</head>
<body>
  <div class="header">
    <div class="brand-icon">🛡</div>
    <div>
      <div class="brand-name">RiskRadar</div>
      <div class="brand-sub">Fraud Link Detection</div>
    </div>
  </div>

  <div class="toggle-row">
    <span class="toggle-label">Protection Active</span>
    <label class="toggle">
      <input type="checkbox" id="enableToggle" checked />
      <div class="toggle-track"></div>
      <div class="toggle-thumb"></div>
    </label>
  </div>

  <div class="last-scan">
    <div class="section-label">Last Scan</div>
    <div id="lastScanContent" class="scan-empty">No links scanned yet</div>
  </div>

  <div class="footer">
    <a href="http://localhost:5173" target="_blank" class="btn btn-primary">Open App</a>
    <button id="clearBtn" class="btn btn-secondary">Clear</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
