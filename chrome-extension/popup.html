<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RiskRadar Protector</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 380px;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(180deg, #0a0f1e 0%, #111827 100%);
      color: #e2e8f0;
      min-height: 420px;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #1e1b4b 0%, #0f172a 50%, #0c1322 100%);
      padding: 22px 20px;
      text-align: center;
      border-bottom: 1px solid rgba(99, 102, 241, 0.3);
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(ellipse at 50% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 60%);
      animation: pulse-glow 4s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
    }

    .header h1 {
      font-size: 22px;
      font-weight: 700;
      position: relative;
      z-index: 1;
      letter-spacing: 0.5px;
    }

    .header .tagline {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 4px;
      position: relative;
      z-index: 1;
    }

    /* Status Bar */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px;
      background: rgba(16, 185, 129, 0.1);
      border-bottom: 1px solid rgba(16, 185, 129, 0.2);
      font-size: 13px;
      font-weight: 600;
      color: #6ee7b7;
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #10b981;
      animation: blink 2s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status-bar.offline {
      background: rgba(251, 191, 36, 0.1);
      border-bottom-color: rgba(251, 191, 36, 0.2);
      color: #fbbf24;
    }

    .status-bar.offline .status-dot {
      background: #f59e0b;
      animation: none;
    }

    /* Content */
    .content { padding: 16px; }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .stat-card {
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid rgba(51, 65, 85, 0.5);
      border-radius: 10px;
      padding: 14px 8px;
      text-align: center;
      transition: transform 0.2s, border-color 0.2s;
    }

    .stat-card:hover {
      transform: translateY(-2px);
      border-color: rgba(99, 102, 241, 0.4);
    }

    .stat-number {
      font-size: 26px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 6px;
    }

    .stat-label {
      font-size: 10px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
    }

    .stat-card.safe .stat-number { color: #34d399; }
    .stat-card.danger .stat-number { color: #f87171; }
    .stat-card.total .stat-number { color: #818cf8; }

    /* Section Label */
    .section-label {
      font-size: 12px;
      font-weight: 700;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    /* Manual Scan */
    .scan-section { margin-bottom: 16px; }

    .scan-input-group {
      display: flex;
      gap: 8px;
    }

    .scan-input {
      flex: 1;
      padding: 11px 14px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #f1f5f9;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .scan-input::placeholder { color: #64748b; }

    .scan-input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    .scan-btn {
      padding: 11px 20px;
      background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .scan-btn:hover {
      background: linear-gradient(135deg, #818cf8 0%, #6366f1 100%);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }

    .scan-btn:active { transform: translateY(0); }
    .scan-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Scan Result */
    .scan-result {
      margin-top: 10px;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
      animation: fade-in 0.3s ease;
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .scan-result.visible { display: block; }

    .scan-result.safe {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.25);
      color: #a7f3d0;
    }

    .scan-result.danger {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.25);
      color: #fecaca;
    }

    .result-header {
      font-weight: 700;
      margin-bottom: 6px;
      font-size: 14px;
    }

    .result-reasons {
      margin: 6px 0 0 0;
      padding: 0 0 0 16px;
      font-size: 12px;
      line-height: 1.6;
    }

    .result-reasons li { margin-bottom: 2px; }

    /* Action Buttons */
    .actions {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }

    .action-btn {
      flex: 1;
      padding: 10px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #cbd5e1;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .action-btn:hover {
      background: #283548;
      border-color: #475569;
      color: #f1f5f9;
      transform: translateY(-1px);
    }

    /* Footer */
    .footer {
      text-align: center;
      font-size: 11px;
      color: #475569;
      padding-top: 10px;
      border-top: 1px solid rgba(51, 65, 85, 0.3);
    }

    .footer a {
      color: #818cf8;
      text-decoration: none;
      cursor: pointer;
    }

    .footer a:hover {
      color: #a5b4fc;
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>RiskRadar</h1>
    <div class="tagline">AI-Powered Phishing &amp; Fraud Shield</div>
  </div>

  <div class="status-bar" id="statusBar">
    <div class="status-dot"></div>
    <span id="statusText">Protection Active</span>
  </div>

  <div class="content">

    <div class="stats-grid">
      <div class="stat-card total">
        <div class="stat-number" id="stat-total">0</div>
        <div class="stat-label">Scanned</div>
      </div>
      <div class="stat-card safe">
        <div class="stat-number" id="stat-safe">0</div>
        <div class="stat-label">Safe</div>
      </div>
      <div class="stat-card danger">
        <div class="stat-number" id="stat-dangerous">0</div>
        <div class="stat-label">Threats</div>
      </div>
    </div>

    <div class="scan-section">
      <div class="section-label">Quick Scan</div>
      <div class="scan-input-group">
        <input type="text" class="scan-input" id="scanInput" placeholder="Paste a URL or suspicious text..." />
        <button class="scan-btn" id="scanBtn">Scan</button>
      </div>
      <div class="scan-result" id="scanResult"></div>
    </div>

    <div class="actions">
      <button class="action-btn" id="scanPageBtn">Scan This Page</button>
      <button class="action-btn" id="settingsBtn">Settings</button>
    </div>

    <div class="footer">
      RiskRadar v2.0 &middot; <a href="#" id="aboutLink">About</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
